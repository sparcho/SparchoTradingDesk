# equity_taxonomy.yaml — 5-Layer-Cake (5LC) layer + USP cluster per ticker.
# Authored 2026-06-01 per operator directive: "use 5LC as the primary grouping
# structure, then group by clusters ... group them according to what their actual USP is."
#
# Primary grouping  = layer  (the 5LC layer)
# Secondary grouping = cluster (the name's ACTUAL USP — what the company actually does)
#
# Consumed by equity_dashboard_emit.py (joins layer+cluster onto bubble_set +
# watchlist_rundown). Single source of truth for dashboard grouping.

layer_order: [L1, L2, L3, L4, L5, DPI, PH, UNMAPPED]
layer_names:
  L1: "Energy & Resources"
  L2: "Chips & Electronics"
  L3: "Infrastructure & Hardware"
  L4: "IT Services"
  L5: "Applications / Vertical AI"
  DPI: "India Stack / Financials"
  PH: "Pharma"
  UNMAPPED: "Unmapped"

