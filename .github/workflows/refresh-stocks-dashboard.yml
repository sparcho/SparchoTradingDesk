name: Refresh stocks dashboard

# Full server-side refresh (runs in GitHub's cloud — operator's laptop can be off):
#   fetch caches (yfinance/urllib) -> run the 4 screener lenses -> rebuild the screener
#   section of the published aggregate (ci_screener_emit, merge-preserving the
#   operator/intel sections) -> overlay live held+universe prices/moves (refresh_prices).
# This makes the screener FIRES + prices/moves both cloud-fresh (closes the F117 gap).
#
# Triggers: weekday cron (pre-open + post-close IST) · manual · on engine/script edits.

on:
  schedule:
    - cron: '20 3 * * 1-5'    # ~08:50 IST (pre-open) weekdays
    - cron: '45 10 * * 1-5'   # ~16:15 IST (post-close) weekdays
  workflow_dispatch:
  push:
    paths:
      - 'stocks/engine/**'
      - 'stocks/generators/**'
      - '.github/workflows/refresh-stocks-dashboard.yml'

permissions:
  contents: write

concurrency:
  group: stocks-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet yfinance numpy pyyaml TA-Lib

      - name: Prepare dirs
        run: mkdir -p stocks/engine/_cache stocks/03_SCREENERS/LAYERS stocks/03_SCREENERS/WATCHLIST

      # Fundamentals come from screener.in, which blocks GitHub runner IPs. They change
      # quarterly, so we use a committed snapshot (seed_fundamentals.csv) refreshed vault-side.
      - name: Seed fundamentals (screener.in unreachable from CI; quarterly-stable)
        run: cp stocks/engine/seed_fundamentals.csv stocks/engine/_cache/fundamentals.csv

      - name: Fetch historical closes (Yahoo)
        run: python stocks/engine/fetch_historical.py --range 1y

      - name: Fetch daily close (Yahoo)
        run: python stocks/engine/fetch_daily_ohlc.py --pull close

      - name: Run screener lenses (4)
        run: python stocks/engine/screener_runner.py

      - name: Rebuild screener section (merge into aggregate, sanity-gated)
        run: python stocks/engine/ci_screener_emit.py

      - name: Overlay live prices + moves + day-trade re-rank
        run: python stocks/generators/refresh_prices.py

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/data/equity_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "auto: screener fires + prices refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase --autostash origin main || true
            git push
          fi
