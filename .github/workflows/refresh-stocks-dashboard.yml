name: Refresh stocks dashboard

# Triggers:
#   - schedule: weekday IST pre-open / post-open / post-close (server-side; laptop can be off)
#   - workflow_dispatch: manual "Run workflow" button in Actions tab
#   - push to stocks/generators/**: if you edit the refresh script
#
# refresh_prices.py pulls live NSE prices for held names + the full screener universe,
# recomputes 1d/3d/5d moves, re-ranks the Day-Trade Fires panel, and updates book/concentration.
# Lens composites/fires come from the vault pipeline (not refreshed here) — see F117.

on:
  schedule:
    - cron: '20 3 * * 1-5'    # ~08:50 IST (pre-open) weekdays
    - cron: '10 4 * * 1-5'    # ~09:40 IST (just after open) weekdays
    - cron: '45 10 * * 1-5'   # ~16:15 IST (post-close) weekdays
  workflow_dispatch:
  push:
    paths:
      - 'stocks/generators/**'
      - '.github/workflows/refresh-stocks-dashboard.yml'

permissions:
  contents: write

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Refresh NSE live prices in aggregate JSON
        run: python stocks/generators/refresh_prices.py

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/data/equity_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "refresh equity prices $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
