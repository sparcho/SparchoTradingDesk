name: Refresh stocks dashboard

# Triggers:
#   - workflow_dispatch: manual "Run workflow" button in Actions tab
#   - push to stocks/generators/**: if you edit the refresh script
#
# Operator-only refresh; no schedule. Click "Run workflow" any time you want
# fresh NSE prices pulled into the dashboard.

on:
  workflow_dispatch:
  push:
    paths:
      - 'stocks/generators/**'
      - '.github/workflows/refresh-stocks-dashboard.yml'

permissions:
  contents: write

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Refresh NSE live prices in aggregate JSON
        run: python stocks/generators/refresh_prices.py

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/data/equity_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "refresh equity prices $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
