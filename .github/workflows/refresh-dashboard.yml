name: Refresh silver dashboard

# F123b: this cron now runs the FAMILY-DATA-FREE price overlay (silver_refresh_prices.py), NOT the
# full silver_dashboard_emit.py. The full emit needs the family holdings input (silver_holdings.yaml)
# + strategy logic, which must stay PRIVATE (in the vault). The cloud only refreshes live market
# prices on the already-committed aggregate; it never reads holdings and never touches sensitive_enc.
# The HOST runs the full emit (with the operator password + private inputs) and publishes the book.
on:
  schedule:
    # Every 20 min, 24/7 — keeps XAG / SBees / Gold / DXY / USDINR feeling live for family viewing.
    - cron: '*/20 * * * *'
  push:
    paths:
      - 'silver/generators/silver_refresh_prices.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Refresh live prices (no family data)
        run: python silver/generators/silver_refresh_prices.py

      - name: Commit + push if changed
        # The overlay only re-lays public market prices; it never touches sensitive_enc, so a
        # carry-forward is implicit. If the remote moved, reset to latest and re-overlay on top.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add silver/data/silver_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit"; exit 0
          fi
          git commit -m "refresh silver prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          if git push; then echo "pushed (fast path)"; exit 0; fi
          echo "push rejected — remote moved; re-overlaying on latest remote and retrying"
          for i in 1 2 3 4 5; do
            git fetch origin main || { sleep 4; continue; }
            git reset --hard origin/main
            python silver/generators/silver_refresh_prices.py || echo "WARN: overlay failed (continuing)"
            git add silver/data/silver_dashboard_aggregate.json
            if git diff --cached --quiet; then echo "no net change after re-overlay — done"; exit 0; fi
            git commit -m "refresh silver prices (rebuilt on latest) $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then echo "pushed (rebuild attempt $i)"; exit 0; fi
            echo "attempt $i rejected — backing off"; sleep $((RANDOM % 6 + 4))
          done
          echo "::error::could not push after rebuild retries"; exit 1
