name: Refresh silver dashboard

# Runs on schedule + on manual trigger + on YAML edits.
# Schedule chosen to stay safely under goldapi.io's 100/day free quota:
#   - every 20 min Mon-Fri 03:00-22:00 UTC (covers Asia / London / NY trading)
#   - hourly on weekends
#   - ~85 calls/day weekday, ~24/day weekend → well under 100/day cap
on:
  schedule:
    # Mon-Fri 03:00-22:00 UTC every 20 min
    - cron: '*/20 3-22 * * 1-5'
    # Sat-Sun hourly
    - cron: '0 * * * 0,6'
  push:
    paths:
      - '_inputs/silver_holdings.yaml'
      - 'generators/**'
  workflow_dispatch:   # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install PyYAML

      - name: Run emitter (fetches live prices, writes data/silver_dashboard_aggregate.json)
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: python generators/silver_dashboard_emit.py

      - name: Commit + push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/silver_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "refresh silver dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
