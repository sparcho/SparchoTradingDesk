name: Refresh silver dashboard

# Updated paths after silver/ subfolder restructure
on:
  schedule:
    # Mon-Fri 03:00-22:00 UTC every 20 min
    - cron: '*/20 3-22 * * 1-5'
    # Sat-Sun hourly
    - cron: '0 * * * 0,6'
  push:
    paths:
      - 'silver/_inputs/silver_holdings.yaml'
      - 'silver/generators/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install PyYAML requests

      - name: Run emitter
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: python silver/generators/silver_dashboard_emit.py

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add silver/data/silver_dashboard_aggregate.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "refresh silver dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
