name: Day-Trade next-session snapshot (forward guidance)

# Step 2 (2026-06-25): the FORWARD-GUIDANCE cut of Day-Trade Fires ("Tomorrow").
#   - evening cut  (12:00 UTC = 17:30 IST, after EOD data settles): next-session candidates on
#                  today's COMPLETED NSE bar via daytrade_core. basis="nse_close".
#   - morning cut  (03:00 UTC = 08:30 IST, pre-open): re-emit + attach overnight/global context
#                  (US close, DXY/USDINR/Brent, USDJPY, Asia). basis="overnight_refreshed".
# next_session_snapshot.py --cut auto picks morning vs evening by IST hour. Writes the
# `next_session` block into the published aggregate; the dashboard Tomorrow/Today toggle reads it.
# Last-good: a failed compute never blanks a prior good snapshot. GIFT Nifty futures have no free
# feed (reported feeds_missing, never fabricated).

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 17:30 IST — evening cut (post-close)
    - cron: '0 3 * * 1-5'    # 08:30 IST — morning overnight refresh (pre-open)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocks-refresh        # shared with the price/live jobs — queue, never race the aggregate push
  cancel-in-progress: false

jobs:
  next-session:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install --quiet yfinance

      - name: Compute next-session snapshot (auto: morning vs evening by IST hour)
        run: python stocks/generators/next_session_snapshot.py --cut auto

      - name: Commit + push if changed
        # Hardened (mirrors refresh_prices): the aggregate carries the operator's encrypted book and
        # is read-modify-written (next_session only ADDS a public block; sensitive_enc untouched). A
        # moved remote must NOT be merged -> fast-path push; on rejection reset to latest remote and
        # re-overlay the snapshot on top. A failed re-overlay yields no diff -> clean exit (no false alarm).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/data/equity_dashboard_aggregate.json
          if git diff --cached --quiet; then echo "no next_session change"; exit 0; fi
          git commit -m "next-session snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          if git push; then echo "pushed (fast path)"; exit 0; fi
          echo "push rejected — re-overlaying on latest remote and retrying"
          for i in 1 2 3 4 5; do
            git fetch origin main || { sleep 4; continue; }
            git reset --hard origin/main
            python stocks/generators/next_session_snapshot.py --cut auto || echo "WARN: snapshot re-overlay failed (continuing)"
            git add stocks/data/equity_dashboard_aggregate.json
            if git diff --cached --quiet; then echo "no net change after re-overlay — done"; exit 0; fi
            git commit -m "next-session snapshot (rebuilt on latest) $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then echo "pushed (rebuild attempt $i)"; exit 0; fi
            echo "attempt $i rejected — backing off"; sleep $((RANDOM % 6 + 4))
          done
          echo "::error::could not push after rebuild retries"; exit 1
