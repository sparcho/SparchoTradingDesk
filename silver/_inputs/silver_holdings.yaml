# ─────────────────────────────────────────────────────────────────────────────
# 0. LIVE PRICE OVERRIDES — operator-set when Yahoo data is stale/wrong
# ─────────────────────────────────────────────────────────────────────────────
# WHY this exists:
#   - Yahoo's SI=F (silver futures) is closed Sat-Sun → shows last Friday print
#   - Yahoo doesn't have free XAGUSD spot ticker; XAGUSD=X 404s
#   - Operator may see a LIVE OTC spot on TradingView / Kitco / phone app
#     that's hours newer than Yahoo's futures-close print
# USE:
#   - When you see a live price you trust, set live_xagusd_override below
#   - Set null / remove the line to fall back to Yahoo live fetch
#   - Emitter precedence: override > Yahoo live > YAML estimate
overrides:
  live_xagusd_override: 75.62          # 260531 Sun: SI=F 5/30 close (markets weekend-closed); honest weekend pin per override doctrine
  live_xagusd_override_at: "2026-05-30T22:26:37+0530"
  live_silverbees_override: null       # SBees NSE-traded; daily close is authoritative when markets closed


